<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국 금융 시장</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111318; font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif; color: #e2e4ea; min-height: 100vh; padding: 20px; }
.wrap { max-width: 720px; margin: 0 auto; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.dash-title { font-size: 11px; font-weight: 600; color: #4b5563; letter-spacing: 0.1em; text-transform: uppercase; }
.header-r { display: flex; align-items: center; gap: 8px; }
.updated { font-size: 11px; color: #374151; font-family: monospace; }
.ref-btn { background: none; border: 1px solid #2a2d3a; border-radius: 8px; padding: 5px 12px; font-size: 12px; color: #6b7280; cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: inherit; transition: all 0.15s; }
.ref-btn:hover { background: #1a1d27; color: #e2e4ea; }
.ref-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
@media (max-width: 460px) { .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
.card { background: #1a1d27; border-radius: 12px; padding: 16px; border: 1px solid #21242f; }
.clabel { font-size: 10px; color: #4b5563; font-weight: 600; letter-spacing: 0.06em; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; text-transform: uppercase; }
.dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.cval { font-size: 20px; font-weight: 700; color: #f0f1f5; margin-bottom: 5px; line-height: 1.2; letter-spacing: -0.02em; }
.cchg { font-size: 12px; font-weight: 500; }
.csub { font-size: 10px; color: #374151; margin-top: 4px; }
.cerr { font-size: 11px; color: #4b5563; margin-bottom: 5px; }
.up { color: #34d399; } .down { color: #fb923c; } .neutral { color: #6b7280; }
.sk { background: #21242f; border-radius: 4px; animation: pulse 1.4s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }
.spin { display: inline-block; animation: rot .8s linear infinite; }
@keyframes rot { to { transform: rotate(360deg); } }
.footer { margin-top: 12px; display: flex; align-items: center; justify-content: space-between; }
.footer-note { font-size: 10px; color: #1f2937; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <span class="dash-title">한국 금융 시장</span>
    <div class="header-r">
      <span class="updated" id="utime"></span>
      <button class="ref-btn" id="rbtn" onclick="fetchAll()">
        <span id="ricon">↻</span> 새로고침
      </button>
    </div>
  </div>
  <div class="grid" id="grid">
    <div class="card"><div class="clabel"><span class="dot" style="background:#378ADD"></span>KOSPI</div><div class="sk" style="height:26px;width:80%;margin-bottom:7px"></div><div class="sk" style="height:13px;width:55%"></div></div>
    <div class="card"><div class="clabel"><span class="dot" style="background:#34d399"></span>KOSDAQ</div><div class="sk" style="height:26px;width:80%;margin-bottom:7px"></div><div class="sk" style="height:13px;width:55%"></div></div>
    <div class="card"><div class="clabel"><span class="dot" style="background:#fbbf24"></span>Gold</div><div class="sk" style="height:26px;width:80%;margin-bottom:7px"></div><div class="sk" style="height:13px;width:55%"></div></div>
    <div class="card"><div class="clabel"><span class="dot" style="background:#a78bfa"></span>환율</div><div class="sk" style="height:26px;width:80%;margin-bottom:7px"></div><div class="sk" style="height:13px;width:55%"></div></div>
  </div>
  <div class="footer">
    <span class="footer-note">Yahoo Finance 데이터 · 15분 지연 · 참고용</span>
  </div>
</div>
<script>
const SYMBOLS = [
  { id: 'kospi',  label: 'KOSPI',  dot: '#378ADD', symbol: '%5EKS11', unit: '',  dec: 2 },
  { id: 'kosdaq', label: 'KOSDAQ', dot: '#34d399', symbol: '%5EKQ11', unit: '',  dec: 2 },
  { id: 'gold',   label: 'Gold',   dot: '#fbbf24', symbol: 'GC%3DF',  unit: '$', dec: 2, sub: 'USD/oz' },
  { id: 'usdkrw', label: '환율',   dot: '#a78bfa', symbol: 'KRW%3DX', unit: '₩', dec: 1, sub: '원/달러' },
];

const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];

const fmt = (v, dec, unit) => {
  const n = parseFloat(v);
  if (isNaN(n)) return null;
  return (unit || '') + n.toLocaleString('ko-KR', { minimumFractionDigits: dec, maximumFractionDigits: dec });
};

const fmtChg = (c, p) => {
  if (c == null) return { html: '—', cls: 'neutral' };
  const up = c >= 0;
  const ca = Math.abs(c).toLocaleString('ko-KR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const pa = Math.abs(p).toFixed(2);
  return { html: `${up ? '▲' : '▼'} ${ca} (${pa}%)`, cls: up ? 'up' : 'down' };
};

let data = {};

function renderGrid() {
  document.getElementById('grid').innerHTML = SYMBOLS.map(c => {
    const d = data[c.id];
    let valHtml, chHtml;
    if (!d) {
      valHtml = `<div class="sk" style="height:26px;width:80%;margin-bottom:7px"></div>`;
      chHtml = `<div class="sk" style="height:13px;width:55%"></div>`;
    } else if (d.error) {
      valHtml = `<div class="cerr">${d.error}</div>`;
      chHtml = `<div class="cchg neutral">—</div>`;
    } else {
      valHtml = `<div class="cval">${fmt(d.value, c.dec, c.unit) || '—'}</div>`;
      const ch = fmtChg(d.change, d.pct);
      chHtml = `<div class="cchg ${ch.cls}">${ch.html}</div>`;
    }
    return `<div class="card">
      <div class="clabel"><span class="dot" style="background:${c.dot}"></span>${c.label}</div>
      ${valHtml}${chHtml}
      ${c.sub ? `<div class="csub">${c.sub}</div>` : ''}
    </div>`;
  }).join('');
}

async function fetchYahoo(symbol) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=2d`;
  for (const proxy of PROXIES) {
    try {
      const r = await fetch(proxy(url), { signal: AbortSignal.timeout(8000) });
      if (!r.ok) continue;
      const text = await r.text();
      const j = JSON.parse(text);
      const meta = j?.chart?.result?.[0]?.meta;
      if (!meta?.regularMarketPrice) continue;
      const cur = meta.regularMarketPrice;
      const prev = meta.chartPreviousClose || meta.previousClose || cur;
      return {
        value: cur,
        change: cur - prev,
        pct: ((cur - prev) / prev) * 100
      };
    } catch { continue; }
  }
  throw new Error('failed');
}

async function fetchAll() {
  const btn = document.getElementById('rbtn');
  const icon = document.getElementById('ricon');
  btn.disabled = true; icon.className = 'spin';
  data = {};
  renderGrid();

  const results = await Promise.allSettled(
    SYMBOLS.map(s => fetchYahoo(s.symbol))
  );

  SYMBOLS.forEach((s, i) => {
    const r = results[i];
    data[s.id] = r.status === 'fulfilled' ? r.value : { error: '데이터 없음' };
  });

  renderGrid();
  const now = new Date();
  document.getElementById('utime').textContent =
    now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }) + ' 기준';
  btn.disabled = false; icon.className = ''; icon.textContent = '↻';
}

fetchAll();
</script>
</body>
</html>
